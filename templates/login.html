<html>
    <head><title>Login Page</title></head>
    <body>
        <h2>LOGIN FORM</h2>
        <form method = "POST" action = "/login">
            <label for = "username">Username:</label><br>
            <input type = "text" name = "username" placeeholder = "Enter username" required><br><br>
            <label for = "password">Password:</label><br>
            <input type = "password" name = "password" placeeholder = "Enter password" required><br><br>
            <button type = "submit" value = "Login">Login</button>
        </form>
    </body>
</html>
